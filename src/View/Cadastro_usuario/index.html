<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-image">
            <img src="img/undraw_receipt_tzi0.svg" alt="Ilustração de cadastro">
        </div>
        <div class="form">
            <form action="#">
                <div class="form-header">
                    <div class="title">
                        <h1>Cadastre seu perfil</h1>
                    </div>
                    <div class="login-button">
                        <button type="button"><a href="#">Entrar</a></button>
                    </div>
                </div>
 
                <div class="input-group">
                    <div class="input-box">
                        <label for="firstname">Nome Completo</label>
                        <input id="firstname" type="text" placeholder="Digite o nome completo" required>
                    </div>
                    <div class="input-box">
                        <label for="email">E-mail</label>
                        <input id="email" type="email" placeholder="Digite o e-mail" required>
                    </div>
                    <div class="input-box">
                        <label for="number">Telefone</label>
                        <input id="number" type="tel" placeholder="(xx) x xxxx-xxxx" required>
                    </div>
                    <div class="input-box">
                        <label for="password">Senha</label>
                        <input id="password" type="password" placeholder="Digite a senha" required>
                    </div>
                    <div class="input-box">
                        <label for="confirmpassword">Repita a senha</label>
                        <input id="confirmpassword" type="password" placeholder="Confirme sua senha" required>
                    </div>
                </div>
 
                <div class="continue-button">
                    <button type="submit"><a href="#">Prosseguir</a></button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
